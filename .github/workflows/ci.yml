name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check translations
        run: pnpm run i18n:check

      - name: Run unit tests
        run: pnpm test

      - name: Optional quest schema check
        run: pnpm run test:quest-schema

      - name: Build frontend
        run: pnpm build

  bot-checks:
    name: Bot checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — entry points
        run: |
          node --check src/index.js && echo "✅ src/index.js"
          node --check src/register-commands.js && echo "✅ src/register-commands.js"

      - name: Syntax check — commands
        run: |
          for f in src/commands/*.js; do
            node --check "$f" && echo "✅ $f"
          done

      - name: Syntax check — modules
        run: |
          for f in src/config.js src/storage.js src/permissions.js src/worker.js; do
            node --check "$f" && echo "✅ $f"
          done

  
